name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-n-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    
    # Required for trusted publishing
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install build tools
      run: python -m pip install build
      
    - name: Build distribution
      run: python -m build
      
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        # Trusted publishing doesn't require API tokens if configured correctly on PyPI
        # Otherwise, you would use: password: ${{ secrets.PYPI_API_TOKEN }}
        print-hash: true
